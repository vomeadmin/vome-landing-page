  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

dur-fast:       120ms;\n  --dur-med:        220ms;\n}\n\n/* --- Utility type classes mapping to semantic roles --- */\n.ds-display  { font-family: var(--font-display); font-size: var(--fs-display); font-weight: var(--fw-display); line-height: var(--lh-display); color: var(--vome-orange); }\n.ds-h1       { font-family: var(--font-display); font-size: var(--fs-h1);      font-weight: var(--fw-h1);      line-height: var(--lh-h1); }\n.ds-h2       { font-family: var(--font-display); font-size: var(--fs-h2);      font-weight: var(--fw-h2);      line-height: var(--lh-h2); }\n.ds-h3       { font-family: var(--font-display); font-size: var(--fs-h3);      font-weight: var(--fw-h3);      line-height: var(--lh-h3); }\n.ds-lead     { font-family: var(--font-body);    font-size: var(--fs-lead);    font-weight: var(--fw-lead);    line-height: var(--lh-lead);   color: var(--text-muted-ed); }\n.ds-body     { font-family: var(--font-body);    font-size: var(--fs-body);    font-weight: var(--fw-body);    line-height: var(--lh-body);   color: var(--fg-3); }\n.ds-small    { font-family: var(--font-body);    font-size: var(--fs-small);   font-weight: var(--fw-small);   line-height: var(--lh-small);  color: var(--fg-5); }\n.ds-caption  { font-family: var(--font-body);    font-size: var(--fs-caption); font-weight: var(--fw-caption); line-height: var(--lh-caption);color: var(--fg-5); }\n.ds-accent   { font-family: var(--font-accent);  font-size: 22px; font-weight: 500; font-style: italic; color: var(--vome-teal); letter-spacing: 0.2px; }\n\n/* Buttons — matches contactTextClass + submitButton + sectionThreeFiveButton */\n.ds-btn {\n  display: inline-flex; align-items: center; justify-content: center;\n  gap: 8px; padding: 10px 24px; border-radius: var(--radius-md);\n  font-family: var(--font-body); font-size: 14px; font-weight: 600;\n  border: 1px solid transparent; cursor: pointer;\n  transition: background var(--dur-fast) var(--ease-standard), color var(--dur-fast) var(--ease-standard);\n :space-between;\n  font-size:14px;font-weight:500;color:var(--fg-3);\n  border-bottom:1px solid rgba(237,142,52,0.12);\n}\n.topnav__lang{display:inline-flex;align-items:center;gap:8px;color:var(--fg-3);cursor:pointer;font-weight:500}\n.topnav__lang svg.globe{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.6;opacity:.85}\n.topnav__lang svg.caret{width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:2.2;margin-left:-2px;opacity:.75}\n.topnav__lang:hover{color:var(--fg-2)}\n.topnav__links{display:flex;gap:28px;align-items:center}\n.topnav__links a{cursor:pointer;color:var(--fg-3);display:inline-flex;align-items:center;gap:6px;font-weight:500}\n.topnav__links a .caret{width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:2.2;opacity:.75}\n.topnav__links a:hover{color:var(--fg-2)}\n@media (max-width:1100px){\n  .topnav__links a span{display:none}\n  .topnav__links{gap:20px}\n}\n.mainnav{\n  display:flex;align-items:center;\n  padding:20px 8%;\n  background:#fff;\n  position:sticky;top:0;z-index:50;\n}\n.mainnav__logo{height:40px}\n.mainnav__cta{margin-left:auto;display:flex;gap:12px;align-items:center}\n\n/* ---------- Hero ---------- */\n.hero{\n  padding:72px 8% 64px;\n  background:var(--surface-1);\n  position:relative;\n  overflow:hidden;\n}\n.hero__grid{\n  display:grid;\n  grid-template-columns:minmax(0,1.05fr) minmax(0,1fr);\n  gap:64px;\n  align-items:center;\n  max-width:1400px;\n  margin:0 auto;\n}\n.hero__eyebrow{\n  display:inline-flex;align-items:center;gap:10px;\n  font-size:13px;font-weight:600;letter-spacing:.4px;\n  text-transform:uppercase;\n  color:var(--vome-orange);\n  background:var(--vome-peach-50);\n  padding:8px 14px;border-radius:999px;\n  margin-bottom:24px;\n}\n.hero__eyebrow .dot{width:6px;height:6px;border-radius:50%;background:var(--vome-orange)}\n\n.hero__h1{\n  font-family:var(--font-display);\n  font-weight:700;\n  font-size:clamp(30px, 3.1vw, 42px);\n  line-height:1.12;\n  letter-spacing:-0.6px;\n  color:#000;\n  margin:0 0 22px;\n  text-wrap:balance;\n  max-width:680px;\n}\n.hero__h1 .accent{color:#fa935b;font-weight:800}\n.hero__h1 .underline{\n  background-image:linear-gradient(transparent 62%, rgba(250,147,91,.28) 62%);\n  padding:0 2px;\n}\n\n.hero__sub{\n  font-size:17px;\n  line-height:1.55;\n  color:var(--fg-4);\n  font-weight:500;\n  margin:0 0 32px;\n  max-width:640px;\n  text-wrap:pretty;\n}\n.hero__sub strong{color:var(--fg-2);font-weight:600}\n\n.hero__ctas{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:20px}\n.btn{\n  display:inline-flex;align-items:center;justify-content:center;gap:8px;\n  padding:15px 26px;font-size:15px;font-weight:600;\n  border-radius:12px;border:1px solid transparent;cursor:pointer;\n  font-family:inherit;\n  transition:background var(--dur-fast) var(--ease-standard),color var(--dur-fast) var(--ease-standard),border-color var(--dur-fast) var(--ease-standard);\n  white-space:nowrap;\n}\n.btn--primary{background:var(--cta-bg, var(--vome-orange));color:#fff}\n.btn--primary:hover{background:var(--cta-hover, #ED8E34)}\n.btn--ghost{background:#fff;color:var(--fg-2);border-color:rgba(0,0,0,.15)}\n.btn--ghost:hover{border-color:var(--vome-orange);color:var(--vome-orange)}\n.btn--nav{background:var(--cta-bg, var(--vome-orange));color:#fff;padding:10px 18px;font-size:14px;border-radius:10px}\n.btn--nav:hover{background:var(--cta-hover, #ED8E34)}\n.btn--sm{padding:10px 18px;font-size:14px}\n\n.hero__meta{display:flex;gap:22px;font-size:13px;color:var(--fg-5);font-weight:500;flex-wrap:wrap;align-items:center}\n.hero__meta .check{width:16px;height:16px;border-radius:50%;background:var(--vome-green);color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;margin-right:6px}\n.hero__meta span{display:inline-flex;align-items:center}\n\n/* ---------- Hero visual — real Vome UI ---------- */\n.hero__visual{\n  position:relative;\n  aspect-ratio: 5/4;\n}\n.app{\n  background:#fff;\n  border-radius:14px;\n  box-shadow:0 24px 48px -16px rgba(17,17,40,.18), 0 3px 6px rgba(0,0,0,.06);\n  overflow:hidden;\n  height:100%;\n  display:grid;\n  grid-template-columns:60px 1fr;\n  border:1px solid rgba(0,0,0,.05);\n}\n/* --- Sidebar matches real Vome left nav --- */\n.app__side{\n  background:#fff;\n  border-right:1px solid rgba(0,0,0,.06);\n  padding:14px 10px 14px 6px;\n  font-size:11px;\n  overflow:hidden;\n  display:flex;\n  flex-direction:column;\n  align-items:center;\n  gap:2px;\n}\n.org-pill{\n  display:flex;align-items:center;gap:8px;\n  padding:8px 8px;border-bottom:1px solid rgba(0,0,0,.06);\n  margin:-14px -10px 10px;\n  padding:12px 12px;\n  display:none;\n}\n.org-pill .org-logo{\n  width:28px;height:28px;border-radius:6px;\n  border:1px dashed rgba(0,0,0,.2);\n  display:flex;align-items:center;justify-content:center;\n  font-size:7px;color:var(--fg-5);font-weight:600;text-align:center;line-height:1;\n}\n.org-pill .org-name{font-weight:700;color:var(--fg-2);font-size:11px;line-height:1.2}\n.org-pill .org-view{color:var(--vome-orange);font-size:9px;font-weight:500}\n.org-pill .chev{margin-left:auto;color:var(--fg-5);font-size:10px}\n\n.app__group{\n  font-size:8.5px;font-weight:700;letter-spacing:.8px;\n  color:#1a1a1a;text-transform:uppercase;\n  padding:10px 8px 4px;\n  display:none;\n}\n.app__item{\n  display:flex;align-items:center;justify-content:center;\n  padding:8px;border-radius:5px;color:var(--fg-3);\n  font-weight:500;font-size:10px;\n  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;\n  width:44px;height:44px;\n}\n.app__item .i{\n  width:20px;height:20px;flex:0 0 auto;\n  display:inline-flex;align-items:center;justify-content:center;\n  color:var(--fg-4);\n}\n.app__item .i svg{width:20px;height:20px;stroke-width:1.8;stroke:currentColor;fill:none}\n.app__item--active{color:var(--vome-orange);font-weight:600}\n.app__item--active .i{color:var(--vome-orange)}\n.app__item .new-badge{\n  margin-left:auto;font-size:8px;font-weight:600;\n  background:#e6f7ee;color:#00a04a;\n  padding:2px 6px;border-radius:4px;\n}\n.app__item span{display:none}\n\n/* --- Main content area: Sequences board --- */\n.app__main{background:var(--surface-1);padding:14px 16px;overflow:hidden;min-width:0}\n.app__crumb{font-size:10px;color:var(--fg-5);font-weight:500;margin-bottom:4px;display:none}\n.app__crumb strong{color:var(--fg-3);font-weight:600}\n.app__heading{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:14px;gap:10px}\n.app__heading h3{\n  font-family:var(--font-display);font-weight:700;font-size:17px;color:var(--fg-2);\n  margin:0;letter-spacing:-.2px;\n  display:block;\n}\n.app__heading .add-btn{\n  background:var(--vome-orange);color:#fff;\n  border-radius:6px;padding:5px 10px;\n  font-size:10px;font-weight:600;\n  display:inline-flex;align-items:center;gap:4px;\n  box-shadow:0 2px 4px rgba(232,88,62,.25);\n  display:none;\n}\n.app__heading .add-btn::before{content:\"+\";font-weight:700;font-size:12px}\n\n.board{\n  display:grid;grid-template-columns:repeat(3,1fr);\n  gap:10px;\n}\n.col__header{\n  background:#fff;border-radius:8px;\n  padding:8px 11px;margin-bottom:8px;\n  border:1px solid rgba(0,0,0,.05);\n  display:flex;\n  flex-direction:column;\n  gap:5px;\n  align-items:flex-start;\n}\n.col__step{\n  display:inline-block;font-size:8.5px;font-weight:600;\n  background:#f5f5f7;color:var(--fg-4);\n  padding:3px 8px;border-radius:999px;\n  margin-bottom:0;\n}\n.col__chip{\n  display:inline-flex;align-items:center;gap:4px;\n  font-size:9px;font-weight:600;\n  padding:3px 7px;border-radius:4px;\n  margin-bottom:0;\n  align-self:flex-start;\n}\n.chip--interview{background:#fdecec;color:#d63c3c}\n.chip--pdf{background:#efeaff;color:#6a4dd6}\n.chip--bg{background:#eef3ff;color:#3d6ad6}\n.chip .dot{width:5px;height:5px;border-radius:50%;background:currentColor}\n.col__title{font-family:var(--font-display);font-weight:700;font-size:11px;color:var(--fg-2);line-height:1.3;margin:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:none}\n.col__chip span{display:inline}\n\n.card{\n  background:#fff;border-radius:8px;\n  padding:9px 11px;margin-bottom:6px;\n  border:1px solid rgba(0,0,0,.05);\n  box-shadow:0 1px 2px rgba(0,0,0,.03);\n}\n.card__row{display:flex;align-items:center;gap:8px;margin-bottom:5px}\n.card__name{font-weight:700;font-size:10.5px;color:var(--fg-2);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}\n.card__menu{color:var(--fg-5);font-weight:700;font-size:11px;letter-spacing:.5px}\n.card__status{display:flex;align-items:center;gap:5px}\n.card__play{\n  width:16px;height:16px;border-radius:50%;\n  background:#eef3ff;color:#3d6ad6;\n  display:inline-flex;align-items:center;justify-content:center;\n  font-size:7px;flex:0 0 auto;\n  display:none;\n}\n.card__play::before{content:\"▶\"}\n.card__step-pill{\n  font-size:8.5px;font-weight:600;\n  background:var(--surface-2);color:var(--fg-4);\n  padding:2px 7px;border-radius:999px;\n  display:none;\n}\n.card__ok{\n  width:14px;height:14px;border-radius:50%;\n  background:#d9f3e4;color:#00a04a;\n  display:inline-flex;align-items:center;justify-content:center;\n  font-size:9px;font-weight:800;\n}\n.card__pending{\n  width:14px;height:14px;border-radius:50%;\n  background:#fff0db;color:#c9720d;\n  display:inline-flex;align-items:center;justify-content:center;\n  font-size:9px;\n}\n.card__pending::before{content:\"◷\"}\n.card__date{font-size:8.5px;color:var(--fg-5);margin-top:4px;font-weight:500;display:none}\n\n/* --- Floating cards around mock --- */\n.hero__fly{\n  position:absolute;background:#fff;border-radius:12px;\n  box-shadow:0 16px 32px -10px rgba(17,17,40,.22), 0 2px 4px rgba(0,0,0,.06);\n  padding:10px 14px;font-size:12px;font-weight:500;color:var(--fg-3);\n  display:flex;align-items:center;gap:10px;\n  z-index:3;border:1px solid rgba(0,0,0,.04);\n}\n.hero__fly--volunteer{\n  right:18%;bottom:-18px;\n  padding:10px 14px 10px 10px;gap:12px;\n}\n.hero__fly--msg{top:12%;right:-28px;max-width:200px}\n.hero__fly .avatar{\n  width:32px;height:32px;border-radius:50%;\n  background:var(--vome-teal);color:#fff;\n  display:inline-flex;align-items:center;justify-content:center;\n  font-weight:700;font-size:12px;\n}\n.hero__fly strong{font-weight:700;color:var(--fg-2);font-size:13px;display:block}\n.hero__fly .hours{\n  display:inline-flex;align-items:center;gap:4px;\n  background:#d9f3e4;color:#007b38;\n  padding:3px 8px;border-radius:999px;\n  font-size:10px;font-weight:600;margin-top:2px;\n}\n.hero__fly .hours::before{content:\"◷\";font-size:10px}\n.hero__fly .party{font-size:11px;color:var(--fg-4);margin-top:3px}\n.hero__fly .party a{color:var(--vome-orange);font-weight:600;text-decoration:underline}\n.hero__fly .msg-ic{\n  width:28px;height:28px;border-radius:50%;\n  background:var(--vome-peach-50);color:var(--vome-orange);\n  display:inline-flex;align-items:center;justify-content:center;font-size:13px;\n  flex:0 0 auto;\n}\n.hero__fly .msg-ic::before{content:\"\\1F4AC\"}\n.hero__fly small{display:block;font-size:10px;color:var(--fg-5);font-weight:500;margin-top:2px}\n\n/* ---------- Logo marquee ---------- */\n.partners{background:#fff;padding:40px 6% 56px;border-bottom:1px solid rgba(0,0,0,.05)}\n.partners__eyebrow{text-align:center;font-family:var(--font-display);font-size:15px;font-weight:700;color:var(--fg-3);margin:0 0 28px;letter-spacing:.2px}\n.partners__track{\n  display:flex;gap:18px;align-items:center;justify-content:center;\n  flex-wrap:wrap;\n}\n.logo-chip{\n  width:84px;height:84px;border-radius:50%;\n  background:#fff;border:1px solid #ececec;\n  display:flex;align-items:center;justify-content:center;\n  padding:14px;flex:0 0 auto;\n  font-family:var(--font-display);font-size:10px;font-weight:600;color:var(--fg-5);text-align:center;\n}\n.logo-chip img{max-width:100%;max-height:100%;object-fit:contain}\n\n/* ---------- Placeholder sections ---------- */\n.placeholder{\n  padding:72px 8%;\n  text-align:center;\n  border-top:1px solid rgba(0,0,0,.04);\n}\n.placeholder--alt{background:var(--surface-2)}\n.placeholder--grey{background:#fafafa}\n.placeholder__tag{\n  display:inline-block;font-size:11px;font-weight:700;letter-spacing:1px;\n  text-transform:uppercase;color:var(--vome-orange);margin-bottom:12px;\n  padding:4px 10px;background:var(--vome-peach-50);border-radius:999px;\n}\n.placeholder__title{font-family:var(--font-display);font-size:28px;font-weight:700;color:var(--fg-2);margin:0 0 10px}\n.placeholder__body{font-size:15px;color:var(--fg-5);margin:0 auto;max-width:540px}\n\n/* ============================================================\n   Feature Tabs Section\n   ============================================================ */\n.ftabs{\n  padding:96px 8% 80px;\n  background:#fff;\n  border-top:1px solid rgba(0,0,0,.05);\n}\n\n/* Intro header */\n.ftabs__intro{\n  text-align:center;\n  margin:0 auto 64px;\n}\n.ftabs__h2{\n  font-family:var(--font-display);\n  font-size:clamp(28px,3vw,42px);\n  font-weight:700;\n  color:var(--fg-2);\n  margin:0 auto 18px;\n  line-height:1.15;\n  letter-spacing:-.4px;\n  text-wrap:balance;\n  max-width:720px;\n}\n.ftabs__h2-accent{color:var(--vome-orange)}\n.ftabs__sub{\n  font-size:18px;\n  color:var(--fg-3);\n  line-height:1.6;\n  font-weight:500;\n  max-width:780px;\n  margin:0 auto;\n  text-wrap:balance;\n}\n.ftabs__videobtn{\n  display:inline-flex;align-items:center;gap:8px;\n  margin-top:22px;\n  background:#fff;border:1px solid #e6e6ea;border-radius:999px;\n  padding:9px 18px 9px 10px;\n  font-family:var(--font-display);font-weight:700;font-size:14px;color:var(--fg-2);\n  text-decoration:none;cursor:pointer;\n  transition:border-color 120ms, transform 120ms, box-shadow 120ms;\n  box-shadow:0 1px 2px rgba(0,0,0,.04);\n}\n.ftabs__videobtn:hover{\n  border-color:var(--vome-orange);\n  box-shadow:0 4px 14px rgba(250,147,91,.15);\n}\n.ftabs__videoplay{\n  display:inline-flex;align-items:center;justify-content:center;\n  width:22px;height:22px;border-radius:50%;\n  background:var(--vome-orange);color:#fff;\n  padding-left:1px;\n}\n\n/* Tab bar */\n.ftabs__bar{\n  display:flex;\n  gap:0;\n  justify-content:center;\n  border-bottom:2px solid #eee;\n  margin-bottom:56px;\n  overflow-x:auto;\n  scrollbar-width:none;\n}\n.ftabs__bar::-webkit-scrollbar{display:none}\n.ftabs__tab{\n  display:inline-flex;align-items:center;gap:8px;\n  padding:14px 24px;\n  font-family:var(--font-display);\n  font-size:14px;font-weight:600;\n  color:var(--fg-5);\n  background:none;border:none;cursor:pointer;\n  border-bottom:3px solid transparent;\n  margin-bottom:-2px;\n  white-space:nowrap;\n  transition:color 120ms, border-color 120ms;\n}\n.ftabs__tab svg{\n  width:16px;height:16px;\n  stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;\n  flex:0 0 auto;\n}\n.ftabs__tab:hover{color:var(--fg-2)}\n.ftabs__tab--active{\n  color:var(--vome-orange-700);\n  border-bottom-color:var(--vome-orange);\n}\n\n/* Panels */\n.ftabs__panel{display:none}\n.ftabs__panel--active{display:grid;grid-template-columns:1fr 1fr;gap:56px;align-items:center}\n\n/* Left side */\n.ftabs__panel-sub{\n  font-size:16px;color:var(--fg-4);line-height:1.5;font-weight:500;\n  margin:-24px 0 28px;text-wrap:pretty;\n}\n.ftabs__headline{\n  font-family:var(--font-display);\n  font-size:clamp(22px,2.2vw,30px);\n  font-weight:700;\n  color:var(--fg-2);\n  margin:0 0 36px;\n  line-height:1.25;\n  letter-spacing:-.3px;\n}\n.ftabs__grid{\n  display:grid;\n  grid-template-columns:1fr 1fr;\n  gap:16px;\n  grid-auto-rows:1fr;\n}\n.ftabs__feat{\n  display:flex;flex-direction:column;gap:0;\n  background:var(--surface-1);\n  border-radius:16px;\n  padding:20px;\n  align-self:stretch;\n}\n.ftabs__icon{\n  width:36px;height:36px;border-radius:10px;\n  background:var(--vome-peach-50);\n  display:flex;align-items:center;justify-content:center;\n  flex:0 0 auto;\n  margin-bottom:14px;\n}\n.ftabs__i }\n\n/* ============================================================\n   Section 4 : Security (editorial, no numbered cards)\n   ============================================================ */\n.sec{\n  background:#1a1a2a;\n  background-image:\n    radial-gradient(circle at 12% 0%, rgba(250,147,91,.10) 0, transparent 45%),\n    radial-gradient(circle at 88% 100%, rgba(71,114,196,.08) 0, transparent 45%);\n  color:rgba(255,255,255,.82);\n  padding:96px 8% 88px;\n  position:relative;\n}\n.sec::before{\n  content:\"\";position:absolute;top:0;left:0;right:0;height:1px;\n  background:linear-gradient(90deg,transparent,rgba(250,147,91,.35),transparent);\n}\n.sec__wrap{max-width:1200px;margin:0 auto}\n.sec__intro{\n  text-align:center;\n  max-width:860px;\n  margin:0 auto 40px;\n}\n.sec__eyebrow{\n  display:inline-flex;align-items:center;gap:10px;\n  font-family:var(--font-display);\n  font-size:12px;font-weight:700;letter-spacing:.6px;\n  text-transform:uppercase;\n  color:var(--vome-orange);\n  background:rgba(250,147,91,.1);\n  padding:8px 14px;border-radius:999px;\n  margin-bottom:20px;\n  border:1px solid rgba(250,147,91,.25);\n}\n.sec__eyebrow .dot{width:6px;height:6px;border-radius:50%;background:var(--vome-orange)}\n.sec__h2{\n  font-family:var(--font-display);\n  font-size:clamp(28px,2.8vw,40px);\n  font-weight:700;\n  color:#fff;\n  line-height:1.15;\n  letter-spacing:-0.5px;\n  margin:0 0 16px;\n  white-space:nowrap;\n}\n.sec__sub{\n  font-size:17px;line-height:1.55;\n  color:rgba(255,255,255,.65);\n  font-weight:500;\n  margin:0 auto;\n  max-width:640px;\n  text-wrap:pretty;\n}\n\n/* Compliance strip : real seals */\n/* Compliance badges row : circular badges inspired by the reference seals */\n.sec__badges{\n  display:flex;align-items:center;justify-content:center;\n  gap:clamp(16px, 2.4vw, 36px);\n  flex-wrap:wrap;\n  margin:8px auto 48px;\n  max-width:980px;\n  padding:20px 24px;\n  position:relative;\n}\n.sec__badges::before{\n  content:\"\";position:absolut size:14px;font-weight:800;color:#FFD400;letter-spacing:.3px;\n  position:relative;z-index:2;\n}\n.sec__badgestars{\n  position:absolute;inset:0;width:100%;height:100%;\n}\n/* PIPEDA : Canadian red with leaf */\n.sec__badge--pipeda{\n  background:radial-gradient(circle at 35% 30%, #d82b2b 0%, #a81818 100%);\n  gap:4px;\n}\n.sec__badgeleafsvg{\n  width:22px;height:22px;\n  margin-bottom:2px;\n}\n.sec__badge--pipeda .sec__badgename{font-size:10.5px}\n/* CCPA : teal */\n.sec__badge--ccpa{\n  background:radial-gradient(circle at 35% 30%, #1d6e88 0%, #0d4558 100%);\n}\n.sec__badge--ccpa .sec__badgename{font-size:14px}\n/* PCI DSS : deep indigo */\n.sec__badge--pci{\n  background:radial-gradient(circle at 35% 30%, #3b1e6e 0%, #1d0f40 100%);\n  gap:3px;\n}\n.sec__badge--pci .sec__badgename{font-size:15px;color:#fff}\n.sec__badge--pci .sec__badgesub{font-size:9px;color:#c8b8ff}\n\n/* Three pillars : inline editorial layout */\n.sec__pillars{\n  display:grid;\n  grid-template-columns:repeat(3,minmax(0,1fr));\n  gap:48px 40px;\n  margin-bottom:56px;\n  padding-top:8px;\n}\n.sec__pillar{\n  display:flex;flex-direction:column;gap:14px;\n  position:relative;\n  padding-top:24px;\n}\n.sec__pillar::before{\n  content:\"\";position:absolute;top:0;left:0;width:40px;height:2px;\n  background:var(--vome-orange);border-radius:2px;\n}\n.sec__pillaricon{\n  color:var(--vome-orange);\n  width:44px;height:44px;border-radius:10px;\n  background:rgba(250,147,91,.08);\n  display:flex;align-items:center;justify-content:center;\n  border:1px solid rgba(250,147,91,.2);\n}\n.sec__pillartitle{\n  font-family:var(--font-display);\n  font-size:20px;font-weight:700;\n  color:#fff;\n  line-height:1.25;\n  letter-spacing:-0.2px;\n  margin:0 0 10px;\n}\n.sec__pillartext{\n  font-size:14.5px;line-height:1.65;\n  color:rgba(255,255,255,.7);\n  margin:0;\n}\n.sec__tags{\n  display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;\n}\n.sec__tag{\n  font-family:'Menlo','Consolas',monospace;\n  font-size:10.5px;font-weight:500;\n  color:rgba(255,255,255,.75);\n  background:rgba(255,255,255,.04);\n  border:1px solid rgba(255,255,255,.1);\n  padding:3px 8px;border-radius:4px;\n}\n\n.sec__ctas{\n  display:flex;justify-content:center;align-items:center;gap:16px;flex-wrap:wrap;\n}\n.btn--dark{\n  background:var(--vome-orange);color:#fff;\n  box-shadow:0 8px 24px -8px rgba(250,147,91,.5);\n}\n.btn--dark:hover{background:var(--vome-orange-700)}\n.btn--ghost-dark{\n  background:transparent;color:rgba(255,255,255,.85);\n  border-color:rgba(255,255,255,.2);\n}\n.btn--ghost-dark:hover{\n  border-color:var(--vome-orange);\n  color:var(--vome-orange);\n}\n\n/* Responsive */\n@media (max-width: 1100px){\n  .sec__h2{white-space:normal;text-wrap:balance}\n}\n@media (max-width: 1000px){\n  .ent__grid{grid-template-columns:1fr;max-width:560px}\n  .sec__pillars{grid-template-columns:1fr;gap:32px}\n  .sec__strip{gap:16px}\n  .sec__striplabel{border-right:none;padding-right:0}\n  .sec__soc2{border-left:none;padding-left:0}\n}\n\n/* Signature navy divider */\n.divider{height:10px;background:var(--surface-ink)}\n\n/* ---------- Footer ---------- */\n.footer{background:#2a2940;color:rgba(255,255,255,.8);padding:48px 8% 32px;font-size:13px}\n.footer__row{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:20px}\n.footer__logo{height:28px;filter:brightness(0) invert(1)}\n\n/* ---------- Tweaks panel ---------- */\n.tweaks{\n  position:fixed;bottom:20px;right:20px;z-index:100;\n  background:#fff;border-radius:14px;\n  box-shadow:0 20px 40px -10px rgba(0,0,0,.25);\n  padding:16px 18px;width:280px;\n  font-size:13px;\n  display:none;\n}\n.tweaks.on{display:block}\n.tweaks h4{margin:0 0 12px;font-family:var(--font-display);font-weight:700;font-size:14px;color:var(--fg-2);display:flex;align-items:center;gap:8px}\n.tweaks h4::before{content:\"\";width:8px;height:8px;border-radius:50%;background:var(--vome-orange)}\n.tweaks .grp{margin-bottom:14px}\n.tweaks .grp:last-child{margin-bottom:0}\n.tweaks label{display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;color:var(--fg-5);margin-bottom:6px}\n.tweaks .opts{display:flex;gap:6px;flex-wrap:wrap}\n.tweaks .opt{\n  padding:6px 10px;border-radius:8px;font-size:12px;font-weight:600;\n  background:#f5f5f7;color:var(--fg-4);cursor:pointer;\n  border:1px solid transparent;\n}\n.tweaks .opt.sel{background:var(--vome-peach-50);color:var(--vome-orange-700);border-color:var(--vome-orange)}\n\n/* ---------- Hero variants ---------- */\n/* v1: default (accent word in orange) */\n/* v2: highlight underline */\nbody[data-hero-style=\"underline\"] .hero__h1 .accent{color:var(--fg-2)}\nbody[data-hero-style=\"underline\"] .hero__h1 .accent .underline{background-image:linear-gradient(transparent 62%, rgba(250,147,91,.35) 62%)}\n/* v3: serif-ish emphasis (keep sans, but italic + weight swap) */\nbody[data-hero-style=\"italic\"] .hero__h1 .accent{color:var(--vome-orange);font-style:italic;font-weight:600}\nbody[data-hero-style=\"italic\"] .hero__h1 .accent .underline{background:none;padding:0}\n/* v4: no accent */\nbody[data-hero-style=\"mono\"] .hero__h1 .accent{color:inherit}\nbody[data-hero-style=\"mono\"] .hero__h1 .accent .underline{background:none;padding:0}\n\n/* sub-size */\nbody[data-sub-size=\"lg\"] .hero__sub{font-size:18px;line-height:1.55}\nbody[data-sub-size=\"md\"] .hero__sub{font-size:16px;line-height:1.6}\nbody[data-sub-size=\"sm\"] .hero__sub{font-size:15px;line-height:1.6}\n\n/* eyebrow on/off */\nbody[data-eyebrow=\"off\"] .hero__eyebrow{display:none}\n\n@media (max-width:900px){\n  .hero__grid{grid-template-columns:1fr;gap:40px}\n  .nav__links{display:none}\n  .hero__visual{aspect-ratio:4/3}\n}\n\n/* ============================================================\n   Section 5 - Testimonials (horizontal auto-scroll)\n   ============================================================ */\n.tst{background:#fff;padding:100px 0 80px;overflow:hidden}\n.tst__wrap{max-width:1200px;margin:0 auto;padding:0 6%}\n.tst__intro{text-align:center;max-width:760px;margin:0 auto 56px}\n.tst__h2{\n  font-family:var(--font-display);\n  font-size:clamp(30px,3vw,44px);\n  font-weight:700;color:#000;line-height:1.15;letter-spacing:-0.6px;\n  margin:0 0 16px;text-wrap:balance;\n}\n.tst__h2accent{color:var(--vome-orange)}\n.tst__sub{font-size:17px;line-height:1.55;color:var(--fg-4);margin:0;text-wrap:pretty}\n\n.tst__marquee{\n  position:relative;\n  width:100vw;\n  margin-left:calc(50% - 50vw);\n  -webkit-mask-image:linear-gradient(90deg,transparent,#000 6%,#000 94%,transparent);\n          mask-image:linear-gradient(90deg,transparent,#000 6%,#000 94%,transparent);\n  padding:12px 0;\n}\n.tst__track{\n  display:flex;gap:24px;\n  width:max-content;\n  animation:tstScroll 60s linear infinite;\n}\n.tst__marquee:hover .tst__track{animation-play-state:paused}\n@keyframes tstScroll{\n  from{transform:translateX(0)}\n  to{transform:translateX(calc(-50% - 12px))}\n}\n\n.tst__card{\n  flex:0 0 380px;\n  background:#fff;\n  border:1px solid var(--vome-sand-300);\n  border-radius:18px;\n  padding:28px;\n  display:flex;flex-direction:column;\n  box-shadow:0 4px 16px -8px rgba(20,20,40,.08);\n}\n.tst__stars{\n  color:var(--vome-orange);\n  font-size:15px;letter-spacing:2px;\n  margin-bottom:16px;\n}\n.tst__quotetxt{\n  font-family:var(--font-display);\n  font-size:16px;line-height:1.55;color:var(--fg-2);\n  font-weight:500;\n  margin:0 0 22px;text-wrap:pretty;flex:1;\n}\n.tst__who{display:flex;align-items:center;gap:12px;margin-top:auto}\n.tst__avatar{\n  width:42px;height:42px;border-radius:50%;\n  color:#fff;font-weight:700;font-size:16px;\n  display:flex;align-items:center;justify-content:center;flex-shrink:0;\n}\n.tst__name{font-family:var(--font-display);font-weight:700;font-size:14px;color:var(--fg-2);line-height:1.2}\n.tst__role{font-size:12px;color:var(--fg-4);margin-top:3px;line-height:1.3}\n\n@media (prefers-reduced-motion: reduce){\n  .tst__track{animation:none}\n}\n\n/* ============================================================\n   Section 6 - Closing CTA\n   ============================================================ */\n.cta{\n  background:linear-gradient(160deg,#1a1b2e 0%,#0f1020 100%);\n  padding:100px 6%;\n  position:relative;overflow:hidden;\n}\n.cta__wrap{\n  max-width:920px;margin:0 auto;\n  text-align:center;position:relative;z-index:1;\n}\n.cta__glow{\n  position:absolute;inset:-20% 20%;\n  background:radial-gradient(60% 60% at 50% 50%, rgba(250,147,91,.25), transparent 70%);\n  pointer-events:none;z-index:0;\n  filter:blur(40px);\n}\n.cta__h2{\n  font-family:var(--font-display);\n  font-size:clamp(36px,3.6vw,56px);\n  font-weight:700;color:#fff;\n  line-height:1.1;letter-spacing:-0.8px;\n  margin:0 0 20px;text-wrap:balance;\n}\n.cta__sub{\n  font-size:19px;line-height:1.55;\n  color:rgba(255,255,255,.75);\n  max-width:680px;margin:0 auto 36px;\n  font-weight:500;text-wrap:pretty;\n}\n.cta__actions{display:inline-flex;gap:12px;flex-wrap:wrap;justify-content:center}\n.cta__btn{\n  display:inline-flex;align-items:center;gap:8px;\n  font-family:var(--font-display);font-weight:700;font-size:16px;\n  padding:14px 28px;border-radius:999px;\n  text-decoration:none;transition:transform .18s ease,box-shadow .18s ease;\n}\n.cta__btn--primary{\n  background:var(--vome-orange);color:#fff;\n  box-shadow:0 8px 20px -6px rgba(250,147,91,.6);\n}\n.cta__btn--primary:hover{transform:translateY(-1px);box-shadow:0 12px 28px -8px rgba(250,147,91,.7)}\n.cta__btn--ghost{\n  background:transparent;color:#fff;\n  border:1px solid rgba(255,255,255,.2);\n}\n.cta__btn--ghost:hover{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.35)}\n.cta__meta{\n  display:flex;gap:28px;justify-content:center;flex-wrap:wrap;\n  margin-top:32px;\n}\n.cta__metaitem{\n  display:inline-flex;align-items:center;gap:8px;\n  font-size:14px;color:rgba(255,255,255,.6);font-weight:500;\n}\n.cta__metaitem svg{color:var(--vome-orange);flex-shrink:0}\n\n/* ============================================================\n   Section 7 - FAQ\n   ============================================================ */\n.faq{background:var(--vome-peach-50);padding:100px 6% 100px}\n.faq__wrap{max-width:920px;margin:0 auto}\n.faq__intro{text-align:center;margin:0 auto 48px;max-width:680px}\n.faq__h2{\n  font-family:var(--font-display);\n  font-size:clamp(30px,3vw,44px);\n  font-weight:700;color:#000;line-height:1.15;letter-spacing:-0.6px;\n  margin:0 0 14px;\n}\n.faq__sub{font-size:16px;line-height:1.6;color:var(--fg-4);margin:0}\n.faq__link{color:var(--vome-orange);text-decoration:none;font-weight:600}\n.faq__link:hover{text-decoration:underline}\n.faq__list{display:flex;flex-direction:column;gap:12px}\n.faq__item{\n  background:#fff;\n  border:1px solid var(--vome-sand-300);\n  border-radius:14px;\n  overflow:hidden;\n  transition:border-color .2s ease, box-shadow .2s ease;\n}\n.faq__item[open]{\n  border-color:var(--vome-orange);\n  box-shadow:0 6px 18px -8px rgba(250,147,91,.25);\n}\n.faq__q{\n  list-style:none;cursor:pointer;\n  padding:20px 24px;\n  display:flex;align-items:center;justify-content:space-between;gap:16px;\n  font-family:var(--font-display);font-weight:700;font-size:17px;\n  color:var(--fg-2);\n}\n.faq__q::-webkit-details-marker{display:none}\n.faq__q > span:first-child{flex:1;text-wrap:pretty}\n.faq__chev{\n  width:32px;height:32px;border-radius:50%;\n  background:var(--vome-peach-50);color:var(--vome-orange);\n  display:flex;align-items:center;justify-content:center;\n  flex-shrink:0;\n  transition:transform .25s ease, background .2s ease;\n}\n.faq__item[open] .faq__chev{transform:rotate(180deg);background:var(--vome-orange);color:#fff}\n.faq__a{\n  padding:0 24px 22px;\n  font-size:15px;line-height:1.6;color:var(--fg-4);\n  text-wrap:pretty;\n}\n\n@media (max-width:640px){\n  .faq__q{font-size:15px;padding:16px 18px}\n  .faq__a{padding:0 18px 18px}\n  .cta__h2{font-size:32px}\n  .tst__card{flex-b !-- ============================================================\n     Section 3 - Enterprise\n     ============================================================ -->\n<section class=\"ent\" data-screen-label=\"03 Enterprise\">\n  <div class=\"ent__intro\">\n    <h2 class=\"ent__h2\">Built for enterprise scale.<\u002Fh2>\n    <p class=\"ent__sub\">Run multiple programs, locations, and teams under one account, with the integrations, compliance, and admin controls your organization requires.<\u002Fp>\n  <\u002Fdiv>\n\n  <div class=\"ent__grid\">\n\n    <!-- Card 1 : Portal structure -->\n    <article class=\"ent__card\">\n      <div class=\"ent__visual ent__visual--struct\">\n        <div class=\"ent__node ent__node--root\">\n          <span class=\"ent__nodedot\"><\u002Fspan>Organization\n        <\u002Fdiv>\n        <div class=\"ent__branch\">\n          <div class=\"ent__node\">\n            <span class=\"ent__nodedot ent__nodedot--blue\"><\u002Fspan>Downtown site\n            <span class=\"ent__nodetag\">284 volunteers<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"ent__node\">\n            <span class=\"ent__nodedot ent__nodedot--green\"><\u002Fspan>East chapter\n            <span class=\"ent__nodetag\">156 volunteers<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"ent__node ent__node--active\">\n            <span class=\"ent__nodedot ent__nodedot--orange\"><\u002Fspan>Youth programs\n            <span class=\"ent__nodetag\">92 volunteers<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <h3 class=\"ent__cardtitle\">Split your portal by site, department, or chapter<\u002Fh3>\n      <p class=\"ent__cardbody\">Organize your entire portal around how your organization is actually structured. Each location, department, or chapter can have its own content, admins, and branded experience. Volunteers only see what's relevant to them. Admins only manage what's theirs.<\u002Fp>\n    <\u002Farticle>\n\n    <!-- Card 2 : Admin roles -->\n    <article class=\"ent__card\">\n      <div class=\"ent__visual ent__visual--roles\">\n        <div class=\"ent__role\">\n          <div class=\"ent__roleav\" style=\"background:#f7c7a8;color:#8a3f0f\">KR<\u002Fdiv>\n          <div class=\"ent__roleinfo\">\n            <div class=\"ent__rolename\">Kendra Rivera<\u002Fdiv>\n            <div class=\"ent__rolelabel\">Org admin, full access<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"ent__rolebadge ent__rolebadge--full\">●●●●<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"ent__role\">\n          <div class=\"ent__roleav\" style=\"background:#c6d9f2;color:#1a4580\">JT<\u002Fdiv>\n          <div class=\"ent__roleinfo\">\n            <div class=\"ent__rolename\">Jordan Tan<\u002Fdiv>\n            <div class=\"ent__rolelabel\">Site manager, Downtown<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"ent__rolebadge ent__rolebadge--mid\">●●●○<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"ent__role\">\n          <div class=\"ent__roleav\" style=\"background:#d3eddf;color:#0a5f32\">MP<\u002Fdiv>\n          <div class=\"ent__roleinfo\">\n            <div class=\"ent__rolename\">Maya Patel<\u002Fdiv>\n            <div class=\"ent__rolelabel\">Scheduler, read &amp; edit shifts<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"ent__rolebadge ent__rolebadge--low\">●●○○<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"ent__role ent__role--ghost\">\n          <div class=\"ent__roleav\" style=\"background:#efe2f9;color:#5a2d8f\">+<\u002Fdiv>\n          <div class=\"ent__roleinfo\">\n            <div class=\"ent__rolename\">Invite teammate<\u002Fdiv>\n            <div class=\"ent__rolelabel\">Custom role<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <h3 class=\"ent__cardtitle\">Admin roles and permissions, as granular as you need<\u002Fh3>\n      <p class=\"ent__cardbody\">Invite your whole team with scoped access. Department leads see their department. Site managers see their site. Configure granular read or edit permissions by folder, module, or content type, so every admin has exactly the access they need.<\u002Fp>\n    <\u002Farticle>\n\n    <!-- Card 3 : Integrations hub (real logos, no clipping) -->\n    <article class=\"ent__card\">\n      <div class=\"ent__visual ent__visual--int\">\n        <div class=\"ent__inthub\" aria-label=\"Vome\">\n          <img alt=\"Vome\">\n        <\u002Fdiv>\n        <div class=\"ent__intgrid\">\n          <div class=\"ent__int\" title=\"Salesforce\"><img alt=\"Salesforce\"><\u002Fdiv>\n          <div class=\"ent__int\" title=\"Zapier\"><img alt=\"Zapier\" class=\"ent__int--wide\"><\u002Fdiv>\n          <div class=\"ent__int\" title=\"Microsoft Power Automate\"><img alt=\"Microsoft\"><\u002Fdiv>\n          <div class=\"ent__int\" title=\"Sterling Volunteers\"><img alt=\"Sterling Volunteers\"><\u002Fdiv>\n          <div class=\"ent__int\" title=\"Outlook\"><img alt=\"Outlook\"><\u002Fdiv>\n          <div class=\"ent__int\" title=\"Gmail\"><img alt=\"Gmail\"><\u002Fdiv>\n          <div class=\"ent__int\" title=\"Double the Donation\"><img alt=\"Double the Donation\"><\u002Fdiv>\n          <div class=\"ent__int ent__int--more\" title=\"And more\"><span>+ more<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <h3 class=\"ent__cardtitle\">Integrations that fit your stack<\u002Fh3>\n      <p class=\"ent__cardbody\">Native Salesforce app with two-way sync, Zapier, Microsoft Power Automate, Sterling Volunteers, SCORM Cloud, Verified First, and Double the Donation. All built in. Or use our REST API and custom webhooks to achieve any workflow.<\u002Fp>\n    <\u002Farticle>\n\n  <\u002Fdiv>\n\n  <div class=\"ent__ctas\">\n    <a class=\"btn btn--primary\" href=\"#\">Book a demo<\u002Fa>\n    <a class=\"btn btn--ghost\" href=\"#\">See pricing<\u002Fa>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================================================\n     Section 4 - Security\n     ============================================================ -->\n<section class=\"sec\" data-screen-label=\"04 Security\">\n  <div class=\"sec__wrap\">\n\n    <div class=\"sec__intro\">\n      <h2 class=\"sec__h2\">Security your organization can trust.<\u002Fh2>\n      <p class=\"sec__sub\">Enterprise-grade infrastructure built to meet the reliability, authentication, and compliance standards your organization requires.<\u002Fp>\n    <\u002Fdiv>\n\n    <!-- Three pillars : editorial, no numbered cards -->\n    <div class=\"sec__pillars\">\n\n      <div class=\"sec__pillar\">\n        <div class=\"sec__pillaricon\">\n          <svg viewBox=\"0 0 24 24\" width=\"22\" height=\"22\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"3\" y=\"11\" width=\"18\" height=\"11\" rx=\"2\"><\u002Frect><path d=\"M7 11V7a5 5 0 0110 0v4\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n        <div class=\"sec__pillarbody\">\n          <h3 class=\"sec__pillartitle\">Identity &amp; access<\u002Fh3>\n          <p class=\"sec__pillartext\">Connect to Microsoft Entra ID, ADFS, Jump Cloud, or any SAML-based single sign-on provider. Enforce two-factor authentication across your team with role-based access controls that keep every admin scoped to what they need.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"sec__pillar\">\n        <div class=\"sec__pillaricon\">\n          <svg viewBox=\"0 0 24 24\" width=\"22\" height=\"22\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 7L12 3 4 7v6c0 5 3.5 8 8 9 4.5-1 8-4 8-9z\"><\u002Fpath><path d=\"M9 12l2 2 4-4\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n        <div class=\"sec__pillarbody\">\n          <h3 class=\"sec__pillartitle\">Infrastructure &amp; encryption<\u002Fh3>\n          <p class=\"sec__pillartext\">AES-256 encryption at rest, TLS 1.2+ in transit. Hosted on AWS with high availability, redundancy and continuous monitoring. Built to support the privacy and data protection standards expected by healthcare and enterprise clients.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"sec__pillar\">\n        <div class=\"sec__pillaricon\">\n          <svg viewBox=\"0 0 24 24\" width=\"22\" height=\"22\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z\"><\u002Fpath><polyline points=\"14 2 14 8 20 8\"><\u002Fpolyline><path d=\"M9 15l2 2 4-4\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n        <div class=\"sec__pillarbody\">\n          <h3 class=\"sec__pillartitle\">Compliance<\u002Fh3>\n          <p class=\"sec__pillartext\">Vome follows industry-leading privacy and security frameworks to protect your organization's data at every layer: HIPAA, SOC 2, GDPR, PIPEDA, CCPA, and PCI DSS.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n\n    <!-- Compliance badges row -->\n    <div class=\"sec__badges\" aria-label=\"Compliance certifications\">\n      <div class=\"sec__badge sec__badge--hipaa\" title=\"HIPAA\">\n        <div class=\"sec__badgeshield\">\n          <span class=\"sec__badgename\">HIPAA<\u002Fspan>\n          <span class=\"sec__badgesub\">COMPLIANT<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"sec__badge sec__badge--gdpr\" title=\"GDPR\">\n        <svg class=\"sec__badgestars\" viewBox=\"0 0 80 80\" aria-hidden=\"true\">\n          <g fill=\"#FFD400\">\n            <circle cx=\"40\" cy=\"10\" r=\"1.8\"><\u002Fcircle>\n            <circle cx=\"55\" cy=\"14\" r=\"1.8\"><\u002Fcircle>\n            <circle cx=\"66\" cy=\"25\" r=\"1.8\"><\u002Fcircle>\n            <circle cx=\"70\" cy=\"40\" r=\"1.8\"><\u002Fcircle>\n            <circle cx=\"66\" cy=\"55\" r=\"1.8\"><\u002Fcircle>\n            <circle cx=\"55\" cy=\"66\" r=\"1.8\"><\u002Fcircle>\n            <circle cx=\"40\" cy=\"70\" r=\"1.8\"><\u002Fcircle>\n            <circle cx=\"25\" cy=\"66\" r=\"1.8\"><\u002Fcircle>\n            <circle cx=\"14\" cy=\"55\" r=\"1.8\"><\u002Fcircle>\n            <circle cx=\"10\" cy=\"40\" r=\"1.8\"><\u002Fcircle>\n            <circle cx=\"14\" cy=\"25\" r=\"1.8\"><\u002Fcircle>\n            <circle cx=\"25\" cy=\"14\" r=\"1.8\"><\u002Fcircle>\n          <\u002Fg>\n        <\u002Fsvg>\n        <span class=\"sec__badgename\">GDPR<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"sec__badge sec__badge--pipeda\" title=\"PIPEDA\">\n        <svg class=\"sec__badgeleafsvg\" viewBox=\"0 0 24 24\" aria-hidden=\"true\" fill=\"#fff\"><path d=\"M12 2l1.5 4.5L18 5l-2 4 4 2-4 2 2 4-4.5-1.5L13 20h-2l.5-4.5L7 17l2-4-4-2 4-2-2-4 4.5 1.5L12 2z\"><\u002Fpath><\u002Fsvg>\n        <span class=\"sec__badgename\">PIPEDA<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"sec__badge sec__badge--ccpa\" title=\"CCPA\">\n        <span class=\"sec__badgename\">CCPA<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"sec__badge sec__badge--pci\" title=\"PCI DSS\">\n        <span class=\"sec__badgename\">PCI<\u002Fspan>\n        <span class=\"sec__badgesub\">DSS<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"sec__ctas\">\n      <a class=\"btn btn--ghost-dark\" href=\"#\">Read our privacy policy →<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================================================\n     Section 5 - Testimonials\n     ============================================================ -->\n<section class=\"tst\" data-screen-label=\"05 Testimonials\">\n  <div class=\"tst__wrap\">\n    <div class=\"tst__intro\">\n      <h2 class=\"tst__h2\">See what our customers <span class=\"tst__h2accent\">are saying<\u002Fspan><\u002Fh2>\n      <p class=\"tst__sub\">From hospital systems to national nonprofits, thousands of coordinators trust Vome to manage their volunteers.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"tst__marquee\">\n      <div class=\"tst__track\">\n\n        <figure class=\"tst__card\">\n          <div class=\"tst__stars\" aria-label=\"5 out of 5\">★★★★★<\u002Fdiv>\n          <blockquote class=\"tst__quotetxt\">Vome has transformed how we manage our volunteers. The platform is intuitive, and the support team is exceptional. Our volunteer engagement has increased significantly since we switched.<\u002Fblockquote>\n          <figcaption class=\"tst__who\">\n            <div class=\"tst__avatar\" style=\"background:linear-gradient(135deg,#fdd9be,#fa935b)\">G<\u002Fdiv>\n            <div>\n              <div class=\"tst__name\">Gia<\u002Fdiv>\n              <div class=\"tst__role\">Long Island Alzheimer's &amp; Dementia Center<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Ffigcaption>\n        <\u002Ffigure>\n\n        <figure class=\"tst__card\">\n          <div class=\"tst__stars\">★★★★★<\u002Fdiv>\n          <blockquote class=\"tst__quotetxt\">The scheduling features alone have saved us countless hours. Our volunteers love being able to sign up for shifts right from their phones.<\u002Fblockquote>\n          <figcaption class=\"tst__who\">\n            <div class=\"tst__avatar\" style=\"background:linear-gradient(135deg,#c6e3d4,#6aad8a)\">K<\u002Fdiv>\n            <div>\n              <div class=\"tst__name\">Kate<\u002Fdiv>\n              <div class=\"tst__role\">Ronald McDonald House Charities of Columbia, SC<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Ffigcaption>\n        <\u002Ffigure>\n\n        <figure class=\"tst__card\">\n          <div class=\"tst__stars\">★★★★★<\u002Fdiv>\n          <blockquote class=\"tst__quotetxt\">The reporting and analytics have been game-changing for us. We can now track impact, hours, and volunteer retention in ways we never could before.<\u002Fblockquote>\n          <figcaption class=\"tst__who\">\n            <div class=\"tst__avatar\" style=\"background:linear-gradient(135deg,#d4e1f5,#7a9cd6)\">E<\u002Fdiv>\n            <div>\n              <div class=\"tst__name\">Elizabeth<\u002Fdiv>\n              <div class=\"tst__role\">Rochester Regional Health<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Ffigcaption>\n        <\u002Ffigure>\n\n        <figure class=\"tst__card\">\n          <div class=\"tst__stars\">★★★★★<\u002Fdiv>\n          <blockquote class=\"tst__quotetxt\">Vome understands what community engagement managers actually need. It's built by people who get the work, not just the software.<\u002Fblockquote>\n          <figcaption class=\"tst__who\">\n            <div class=\"tst__avatar\" style=\"background:linear-gradient(135deg,#f5d8e8,#d67aa6)\">J<\u002Fdiv>\n            <div>\n              <div class=\"tst__name\">Jessica<\u002Fdiv>\n              <div class=\"tst__role\">Community Engagement Manager, CenterStage<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Ffigcaption>\n        <\u002Ffigure>\n\n        <figure class=\"tst__card\">\n          <div class=\"tst__stars\">★★★★★<\u002Fdiv>\n          <blockquote class=\"tst__quotetxt\">Onboarding was painless and the team walked us through every step. Our volunteers picked up the app immediately, even the ones who said they wouldn't.<\u002Fblockquote>\n          <figcaption class=\"tst__who\">\n            <div class=\"tst__avatar\" style=\"background:linear-gradient(135deg,#ffe4cf,#e89858)\">W<\u002Fdiv>\n            <div>\n              <div class=\"tst__name\">Wesley<\u002Fdiv>\n              <div class=\"tst__role\">Volunteer Engagement Manager, MOLAA<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Ffigcaption>\n        <\u002Ffigure>\n\n        <figure class=\"tst__card\">\n          <div class=\"tst__stars\">★★★★★<\u002Fdiv>\n          <blockquote class=\"tst__quotetxt\">Donation tracking alongside volunteer hours means I finally have one source of truth for everything that keeps our programs running.<\u002Fblockquote>\n          <figcaption class=\"tst__who\">\n            <div class=\"tst__avatar\" style=\"background:linear-gradient(135deg,#e0d4f0,#8f6fbd)\">D<\u002Fdiv>\n            <div>\n              <div class=\"tst__name\">Deirdre<\u002Fdiv>\n              <div class=\"tst__role\">Volunteer &amp; Donations Coordinator, Medicine Hat<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Ffigcaption>\n        <\u002Ffigure>\n\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <script>\n    // Duplicate testimonial cards for seamless infinite scroll\n    (function(){\n      var track = document.querySelector('.tst__track');\n      if (!track) return;\n      var cards = Array.from(track.children);\n      cards.forEach(function(c){ track.appendChild(c.cloneNode(true)); });\n    })();\n  <\u002Fscript>\n<\u002Fsection>\n\n<!-- ============================================================\n     Section 6 - Closing CTA\n     ============================================================ -->\n<section class=\"cta\" data-screen-label=\"06 Closing CTA\">\n  <div class=\"cta__wrap\">\n    <div class=\"cta__glow\" aria-hidden=\"true\"><\u002Fdiv>\n    <h2 class=\"cta__h2\">Ready to see it in action, or want a walk-through with our team?<\u002Fh2>\n    <p class=\"cta__sub\">Sign up for free or schedule a demo to see why thousands of volunteer managers and coordinators are choosing Vome.<\u002Fp>\n    <div class=\"cta__actions\">\n      <a href=\"#\" class=\"cta__btn cta__btn--primary\">Start for free<\u002Fa>\n      <a href=\"#\" class=\"cta__btn cta__btn--ghost\">Schedule a demo<\u002Fa>\n    <\u002Fdiv>\n    <div class=\"cta__meta\">\n      <span class=\"cta__metaitem\"><svg viewBox=\"0 0 24 24\" width=\"16\" height=\"16\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpath><\u002Fsvg>Start with free plan<\u002Fspan>\n      <span class=\"cta__metaitem\"><svg viewBox=\"0 0 24 24\" width=\"16\" height=\"16\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpath><\u002Fsvg>Migration assistance included<\u002Fspan>\n      <span class=\"cta__metaitem\"><svg viewBox=\"0 0 24 24\" width=\"16\" height=\"16\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpath><\u002Fsvg>Live onboarding support<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================================================\n     Section 7 - FAQ\n     ============================================================ -->\n<section class=\"faq\" data-screen-label=\"07 FAQ\">\n  <div class=\"faq__wrap\">\n    <div class=\"faq__intro\">\n      <h2 class=\"faq__h2\">Frequently asked questions<\u002Fh2>\n      <p class=\"faq__sub\">Everything coordinators ask before switching to Vome. Still have questions? <a href=\"#\" class=\"faq__link\">Talk to our team →<\u002Fa><\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"faq__list\">\n      <details class=\"faq__item\" open=\"\">\n        <summary class=\"faq__q\">\n          <span>How long does it take to get set up?<\u002Fspan>\n          <span class=\"faq__chev\" aria-hidden=\"true\"><svg viewBox=\"0 0 24 24\" width=\"18\" height=\"18\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M6 9l6 6 6-6\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n        <\u002Fsummary>\n        <div class=\"faq__a\">Most organizations are fully onboarded within two weeks. Our migration team handles importing your existing volunteer database, shifts, and history, and trains your coordinators before you go live. Larger enterprises with multi-site deployments typically complete rollout in 30–45 days.<\u002Fdiv>\n      <\u002Fdetails>\n\n      <details class=\"faq__item\">\n        <summary class=\"faq__q\">\n          <span>Do you offer a free trial?<\u002Fspan>\n          <span class=\"faq__chev\" aria-hidden=\"true\"><svg viewBox=\"0 0 24 24\" width=\"18\" height=\"18\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M6 9l6 6 6-6\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n        <\u002Fsummary>\n        <div class=\"faq__a\">We offer a free, personalized demo where we walk through Vome with your specific program in mind. If you'd like to try it with real data, we can set up a sandboxed trial account after the demo so you can test workflows with your team before committing.<\u002Fdiv>\n      <\u002Fdetails>\n\n      <details class=\"faq__item\">\n        <summary class=\"faq__q\">\n          <span>Can I import data from my current system?<\u002Fspan>\n          <span class=\"faq__chev\" aria-hidden=\"true\"><svg viewBox=\"0 0 24 24\" width=\"18\" height=\"18\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M6 9l6 6 6-6\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n        <\u002Fsummary>\n        <div class=\"faq__a\">Yes. We migrate volunteer records, hours history, program structures, and custom fields from tools like VolunteerHub, Better Impact, SignUpGenius, Galaxy Digital, and spreadsheets. Our onboarding team handles the whole migration so nothing is lost.<\u002Fdiv>\n      <\u002Fdetails>\n\n      <details class=\"faq__item\">\n        <summary class=\"faq__q\">\n          <span>Is my volunteer data secure?<\u002Fspan>\n          <span class=\"faq__chev\" aria-hidden=\"true\"><svg viewBox=\"0 0 24 24\" width=\"18\" height=\"18\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M6 9l6 6 6-6\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n        <\u002Fsummary>\n        <div class=\"faq__a\">Vome is HIPAA, GDPR, PIPEDA, CCPA, and PCI DSS compliant, with SOC 2 Type II underway. Data is encrypted at rest and in transit, hosted on SOC 2–certified infrastructure, and backed by role-based access controls, audit logs, and SSO for enterprise plans.<\u002Fdiv>\n      <\u002Fdetails>\n\n      <details class=\"faq__item\">\n        <summary class=\"faq__q\">\n          <span>How does pricing work?<\u002Fspan>\n          <span class=\"faq__chev\" aria-hidden=\"true\"><svg viewBox=\"0 0 24 24\" width=\"18\" height=\"18\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M6 9l6 6 6-6\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n        <\u002Fsummary>\n        <div class=\"faq__a\">Pricing is based on your number of active volunteers and the modules you need. We offer tiered plans for single-site nonprofits, multi-site organizations, and enterprise health systems. Reach out for a quote tailored to your program.<\u002Fdiv>\n      <\u002Fdetails>\n\n      <details class=\"faq__item\">\n        <summary class=\"faq__q\">\n          <span>Do volunteers need to download an app?<\u002Fspan>\n          <span class=\"faq__chev\" aria-hidden=\"true\"><svg viewBox=\"0 0 24 24\" width=\"18\" height=\"18\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M6 9l6 6 6-6\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n        <\u002Fsummary>\n        <div class=\"faq__a\">The Vome app is available on iOS and Android and is the best experience for volunteers, but every feature also works on the web. Volunteers can browse opportunities, sign up, and check in directly from a browser if they prefer.<\u002Fdiv>\n      <\u002Fdetails>\n\n      <details class=\"faq__item\">\n        <summary class=\"faq__q\">\n          <span>Can Vome support multiple locations and programs?<\u002Fspan>\n          <span class=\"faq__chev\" aria-hidden=\"true\"><svg viewBox=\"0 0 24 24\" width=\"18\" height=\"18\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M6 9l6 6 6-6\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n        <\u002Fsummary>\n        <div class=\"faq__a\">Yes. Vome is built for multi-site and multi-program organizations. Each location can have its own coordinators, programs, and shifts while rolling up into a unified dashboard for regional or organization-wide reporting.<\u002Fdiv>\n      <\u002Fdetails>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<div class=\"divider\"><\u002Fdiv>\n\n<footer class=\"footer\">\n  <div class=\"footer__row\">\n    <img class=\"footer__logo\" alt=\"Vome\">\n    <span>© 2026 Vome · Volunteer management, simplified.<\u002Fspan>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<!-- Feature tabs JS -->\n<script>\n(function(){\n  const tabs = document.querySelectorAll('.ftabs__tab');\n  const panels = document.querySelectorAll('.ftabs__panel');\n  tabs.forEach(tab => {\n    tab.addEventListener('click', () => {\n      const idx = tab.dataset.tab;\n      tabs.forEach(t => t.classList.remove('ftabs__tab--active'));\n      panels.forEach(p => p.classList.remove('ftabs__panel--active'));\n      tab.classList.add('ftabs__tab--active');\n      document.querySelector(`.ftabs__panel[data-panel=\"${idx}\"]`).classList.add('ftabs__panel--active');\n    });\n  });\n})();\n<\u002Fscript>\n\n<!-- Tweaks panel -->\n<div class=\"tweaks\" id=\"tweaks\">\n  <h4>Tweaks<\u002Fh4>\n  <div class=\"grp\">\n    <label>Headline emphasis<\u002Flabel>\n    <div class=\"opts\" data-key=\"hero-style\">\n      <div class=\"opt\" data-val=\"accent\">Orange accent<\u002Fdiv>\n      <div class=\"opt\" data-val=\"underline\">Underline<\u002Fdiv>\n      <div class=\"opt\" data-val=\"italic\">Italic<\u002Fdiv>\n      <div class=\"opt\" data-val=\"mono\">No accent<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"grp\">\n    <label>Subheader size<\u002Flabel>\n    <div class=\"opts\" data-key=\"sub-size\">\n      <div class=\"opt\" data-val=\"sm\">Small<\u002Fdiv>\n      <div class=\"opt\" data-val=\"md\">Medium<\u002Fdiv>\n      <div class=\"opt\" data-val=\"lg\">Large<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"grp\">\n    <label>Eyebrow pill<\u002Flabel>\n    <div class=\"opts\" data-key=\"eyebrow\">\n      <div class=\"opt\" data-val=\"on\">Show<\u002Fdiv>\n      <div class=\"opt\" data-val=\"off\">Hide<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script>\nconst DEFAULTS = /*EDITMODE-BEGIN*/{\n  \"hero-style\": \"accent\",\n  \"sub-size\": \"md\",\n  \"eyebrow\": \"on\"\n}/*EDITMODE-END*/;\n\nconst state = {...DEFAULTS};\n\nfunction apply(){\n  document.body.setAttribute('data-hero-style', state['hero-style']);\n  document.body.setAttribute('data-sub-size', state['sub-size']);\n  document.body.setAttribute('data-eyebrow', state['eyebrow']);\n  document.querySelectorAll('.tweaks .opts').forEach(group=>{\n    const key = group.dataset.key;\n    group.querySelectorAll('.opt').forEach(o=>{\n      o.classList.toggle('sel', o.dataset.val === state[key]);\n    });\n  });\n}\n\ndocument.querySelectorAll('.tweaks .opt').forEach(opt=>{\n  opt.addEventListener('click', ()=>{\n    const key = opt.parentElement.dataset.key;\n    state[key] = opt.dataset.val;\n    apply();\n    window.parent.postMessage({type:'__edit_mode_set_keys', edits:{[key]: opt.dataset.val}}, '*');\n  });\n});\n\n// Edit-mode host protocol — listener FIRST, then announce.\nwindow.addEventListener('message', (e)=>{\n  const d = e.data || {};\n  if (d.type === '__activate_edit_mode') document.getElementById('tweaks').classList.add('on');\n  if (d.type === '__deactivate_edit_mode') document.getElementById('tweaks').classList.remove('on');\n});\nwindow.parent.postMessage({type:'__edit_mode_available'}, '*');\n\napply();\n<\u002Fscript>\n<script>\n// Set image sources from bundled resources\n(function() {\n  if (window.__resources) {\n    // Navigation logo\n    const navLogo = document.querySelector('.mainnav__logo');\n    if (navLogo) navLogo.src = window.__resources.logoOrange;\n    \n    // Mobile QR logo\n    const qrLogo = document.querySelector('.mob__qrlogo');\n    if (qrLogo) qrLogo.src = window.__resources.appLogoWhite;\n    \n    // Enterprise hub logo\n    const hubLogo = document.querySelector('.ent__inthub img');\n    if (hubLogo) hubLogo.src = window.__resources.appLogoWhite;\n    \n    // Integration logos\n    const intImgs = document.querySelectorAll('.ent__intgrid img');\n    if (intImgs.length >= 7) {\n      intImgs[0].src = window.__resources.intSalesforce;\n      intImgs[1].src = window.__resources.intZapier;\n      intImgs[2].src = window.__resources.intMicrosoft;\n      intImgs[3].src = window.__resources.intSterling;\n      intImgs[4].src = window.__resources.intOutlook;\n      intImgs[5].src = window.__resources.intGmail;\n      intImgs[6].src = window.__resources.intDtd;\n    }\n    \n    // Footer logo\n    const footerLogo = document.querySelector('.footer__logo');\n    if (footerLogo) footerLogo.src = window.__resources.logoWhite;\n  }\n})();\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
